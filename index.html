<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>dummyimage text generator</title>
<style>
  body {
    font-family: system-ui;
    background:#111827;
    color:#e5e7eb;
    padding:20px;
  }
  input, textarea, button {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:1px solid #334155;
    background:#1f2937;
    color:white;
  }
  img {
    margin-top:20px;
    max-width:100%;
    border-radius:12px;
    border:1px solid #334155;
  }
</style>
</head>
<body>

<h2>テキスト → dummyimage 画像生成</h2>

<label>テキスト</label>
<textarea id="text">Hello world</textarea>

<label>幅</label>
<input id="w" type="number" value="1200">

<label>高さ</label>
<input id="h" type="number" value="630">

<label>背景色（HEX）</label>
<input id="bg" value="ffffff">

<label>文字色（HEX）</label>
<input id="fg" value="000000">

<button onclick="gen()">生成</button>

<img id="out" />

<script>
function gen() {
  const text = encodeURIComponent(document.getElementById("text").value);
  const w = document.getElementById("w").value;
  const h = document.getElementById("h").value;
  const bg = document.getElementById("bg").value.replace("#","");
  const fg = document.getElementById("fg").value.replace("#","");

  const url =
    "https://dummyimage.com/" + w + "x" + h +
    "/" + bg + "/" + fg +
    "&text=" + text;

  document.getElementById("out").src = url;
}
gen();
</script>

</body>
</html>
